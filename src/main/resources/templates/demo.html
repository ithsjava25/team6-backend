<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Mode - Incident Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            max-width: 1280px;
            margin: 0 auto;
            width: 100%;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .logo a {
            text-decoration: none;
            color: #ffffff;
            font-weight: 600;
            font-size: 1.25rem;
        }

        .back-link {
            text-decoration: none;
            color: #6b7280;
            font-size: 0.875rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #ffffff;
        }

        .hero {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            min-height: calc(100vh - 80px);
        }

        .hero-container {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            text-align: center;
        }

        .hero h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 1rem;
        }

        .hero p {
            font-size: 1.125rem;
            color: #6b7280;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .demo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .demo-card {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 1rem;
            padding: 2rem 1.5rem;
            text-align: center;
            transition: all 0.2s;
            cursor: pointer;
        }

        .demo-card:hover {
            border-color: #2a2a2a;
            transform: translateY(-4px);
        }

        .demo-card.resident:hover {
            border-color: #10b981;
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.1);
        }

        .demo-card.handler:hover {
            border-color: #f97316;
            box-shadow: 0 8px 20px rgba(249, 115, 22, 0.1);
        }

        .demo-card.admin:hover {
            border-color: #ef4444;
            box-shadow: 0 8px 20px rgba(239, 68, 68, 0.1);
        }

        .demo-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .demo-card h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .demo-card p {
            font-size: 0.875rem;
            color: #6b7280;
            margin-bottom: 1.5rem;
        }

        .demo-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .badge-resident {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .badge-handler {
            background: rgba(249, 115, 22, 0.2);
            color: #f97316;
        }

        .badge-admin {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .coming-soon {
            background: rgba(107, 114, 128, 0.2);
            border-radius: 0.5rem;
            padding: 1rem;
            margin-top: 2rem;
            text-align: center;
        }

        .coming-soon p {
            margin: 0;
            font-size: 0.875rem;
            color: #9ca3af;
        }

        .btn {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            background: #e6e6e6;
            transform: scale(1.02);
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 1rem;
            }
            .demo-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            .hero h1 {
                font-size: 1.75rem;
            }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="logo">
        <a href="/">Incident Management System</a>
    </div>
    <a href="/" class="back-link">← Back to home</a>
</nav>

<main class="hero">
    <div class="hero-container">
        <h1>Demo Mode</h1>
        <p>Test the system read-only with different user roles</p>

        <div class="demo-grid">
            <div class="demo-card resident" onclick="showComingSoon('Resident')">
                <h3>Resident</h3>
                <span class="demo-badge badge-resident">Resident</span>
            </div>

            <div class="demo-card handler" onclick="showComingSoon('Handler')">
                <h3>Handler</h3>
                <span class="demo-badge badge-handler">Handler</span>
            </div>

            <div class="demo-card admin" onclick="showComingSoon('Admin')">
                <h3>Admin</h3>
                <span class="demo-badge badge-admin">Admin</span>
            </div>
        </div>

        <div class="coming-soon">
            <p>Demo mode is coming soon. Sign in with GitHub to use the full system.</p>
        </div>

        <div style="margin-top: 2rem;">
            <a href="/oauth2/authorization/github" class="btn">
                Sign in with GitHub instead →
            </a>
        </div>
    </div>
</main>

<script>
    function showComingSoon(role) {
        alert(`${role} demo mode is coming soon!\n\nSign in with GitHub to access the full system.`);
    }
</script>
</body>
</html>
