<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Incident</title>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif, Roboto;
            background: #000;
            color: #fff;
        }

        .container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .card {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 1.5rem;
            padding: 2rem;
        }

        h2 {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-top: 1rem;
            font-size: 0.875rem;
            color: #6b7280;
        }

        input, textarea, select {
            width: 100%;
            margin-top: 0.25rem;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid #2a2a2a;
            background: #000;
            color: #fff;
        }

        button {
            margin-top: 1.5rem;
            width: 100%;
            padding: 0.75rem;
            border-radius: 9999px;
            border: none;
            background: linear-gradient(135deg, #047857, #065f46);
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h2>Report Incident</h2>

        <form id="incidentForm">

            <label for="subject">Subject:</label>
            <input type="text" id="subject" name="subject" required />

            <label for="description">Description</label>
            <textarea id="description" name="description"></textarea>

            <label for="category">Category:</label>
            <select id="category" name="incidentCategory" required>
                <option value="OTHER">Other</option>
                <option value="LAUNDRY_ROOM">Laundry room</option>
                <option value="NOISE_DISTURBANCE">Noise Disturbance</option>
                <option value="DAMAGE">Damage</option>
            </select>

            <button type="submit">Create Incident</button>
        </form>
    </div>
</div>

<script>
    document.getElementById("incidentForm").addEventListener("submit", async function(e) {
        e.preventDefault();

        const formData = new FormData(e.target);

        const data = {
            subject: formData.get("subject"),
            description: formData.get("description"),
            incidentCategory: formData.get("incidentCategory")
        };

        const response = await fetch("/api/incidents", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        if (response.ok) {
            alert("Incident created!");
            e.target.reset();
        } else {
            const errorData = await response.json().catch(() => null);
            const message = errorData?.message || 'Error: ${response.status}';
            alert('Failed to create incident: ${message}')
        }
    });
</script>
</body>
</html>
