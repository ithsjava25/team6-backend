<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Incident</title>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif, Roboto;
            background: #000;
            color: #fff;
        }

        .container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .card {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 1.5rem;
            padding: 2rem;
        }

        h2 {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-top: 1rem;
            font-size: 0.875rem;
            color: #6b7280;
        }

        input, textarea, select {
            width: 100%;
            margin-top: 0.25rem;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid #2a2a2a;
            background: #000;
            color: #fff;
        }

        button {
            margin-top: 1.5rem;
            width: 100%;
            padding: 0.75rem;
            border-radius: 9999px;
            border: none;
            background: linear-gradient(135deg, #047857, #065f46);
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h2>Report Incident</h2>

        <form th:action="@{/create-incident}" th:object="${incidentRequest}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <!-- GLOBAL ERROR -->
            <div th:if="${fields.hasErrors('*')}" style="color: red;">
                Please correct the errors below.
            </div>

            <!--SUBJECT-->
            <label>Subject:</label>
            <input type="text" th:field="*{subject}"/>
            <div th:if="${fields.hasErrors('subject')}"
                 th:errors="*{subject}"
                 style="color: red;">
            </div>

            <!--DESCRIPTION-->
            <label>Description:</label>
            <textarea th:field="*{description}"></textarea>
            <div th:if="${fields.hasErrors('description')}"
                 th:errors="*{description}"
                 style="color: red;">
            </div>

            <!--CATEGORY-->
            <label>Category:</label>
            <select th:field="*{incidentCategory}">
                <option value="">-- Select Category --</option>
                <option value="OTHER">Other</option>
                <option value="LAUNDRY_ROOM">Laundry room</option>
                <option value="NOISE_DISTURBANCE">Noise Disturbance</option>
                <option value="DAMAGE">Damage</option>
            </select>
            <div th:if="${fields.hasErrors('incidentCategory')}"
                 th:errors="*{incidentCategory}"
                 style="color: red;">
            </div>

            <button type="submit">Create Incident</button>
        </form>

        <!--SUCCESS-MESSAGE-->
        <div th:if="${success}" th:text="${success}" style="color:green;"></div>
    </div>
</div>
</body>
</html>
