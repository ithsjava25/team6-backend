<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Incident Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            max-width: 1280px;
            margin: 0 auto;
            width: 100%;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .logo a {
            text-decoration: none;
            color: #ffffff;
            font-weight: 600;
            font-size: 1.25rem;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: #6b7280;
            font-size: 0.875rem;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: #ffffff;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-name {
            font-size: 0.875rem;
            color: #ffffff;
        }

        .role-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .role-badge.admin {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }

        .role-badge.handler {
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: white;
        }

        .role-badge.resident {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }

        .role-badge.pending {
            background: #6b7280;
            color: white;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid #2a2a2a;
            color: #6b7280;
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            border-color: #ef4444;
            color: #ef4444;
        }

        .container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .profile-card {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 1.5rem;
            overflow: hidden;
        }

        .profile-header {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2) 0%, rgba(5, 150, 105, 0.1) 100%);
            padding: 2rem;
            text-align: center;
            border-bottom: 1px solid #1a1a1a;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 1rem;
            overflow: hidden;
            position: relative;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-avatar .avatar-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #10b981, #059669);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 600;
            color: white;
        }

        .profile-header h2 {
            font-size: 1.5rem;
            margin-bottom: 0.25rem;
        }

        .profile-header p {
            color: #6b7280;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        .profile-body {
            padding: 2rem;
        }

        .info-group {
            margin-bottom: 1.5rem;
        }

        .info-label {
            font-size: 0.75rem;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.25rem;
        }

        .info-value {
            font-size: 1rem;
            font-weight: 500;
            color: #ffffff;
        }

        .pending-note {
            background: rgba(107, 114, 128, 0.2);
            border: 1px solid #6b7280;
            border-radius: 0.5rem;
            padding: 1rem;
            margin-top: 1rem;
            text-align: center;
            color: #9ca3af;
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="logo">
        <a href="/">Incident Management System</a>
    </div>
    <div class="nav-links">
        <a href="/dashboard">Home</a>
        <a th:if="${role != 'PENDING'}" href="/incidents">Incidents</a>
        <a href="/profile">Profile</a>
        <div th:if="${role == 'ADMIN'}">
            <a href="/admin">Admin</a>
        </div>
        <div class="user-info">
            <span class="user-name" th:text="${user.name != null ? user.name : user.githubLogin}">User</span>
            <span class="role-badge" th:classappend="${role.toLowerCase()}" th:text="${role}">-</span>
            <button class="logout-btn" onclick="logout()">Sign out</button>
        </div>
    </div>
</nav>

<div class="container">
    <div class="profile-card">
        <div class="profile-header">
            <div class="profile-avatar" id="avatar">
                <img th:if="${user.avatarUrl != null}" th:src="${user.avatarUrl}" alt="Profile picture">
                <div th:if="${user.avatarUrl == null}" class="avatar-placeholder" th:text="${user.name != null ? user.name.substring(0,1).toUpperCase() : user.githubLogin.substring(0,1).toUpperCase()}">K</div>
            </div>
            <h2 th:text="${user.name != null ? user.name : user.githubLogin}">User Name</h2>
            <p th:text="${user.email}">user@example.com</p>
            <span class="role-badge" th:classappend="${role.toLowerCase()}" th:text="${role}">-</span>
        </div>

        <div class="profile-body">
            <div class="info-group">
                <div class="info-label">Display Name</div>
                <div class="info-value" th:text="${user.name != null ? user.name : user.githubLogin}">-</div>
            </div>

            <div class="info-group">
                <div class="info-label">Email</div>
                <div class="info-value" th:text="${user.email}">-</div>
            </div>

            <div class="info-group">
                <div class="info-label">GitHub Username</div>
                <div class="info-value" th:text="${user.githubLogin}">-</div>
            </div>

            <div class="info-group">
                <div class="info-label">Account Created</div>
                <div class="info-value" id="accountCreated" th:attr="data-created-at=${user.createdAt}" >-</div>
            </div>

            <div th:if="${role == 'PENDING'}" class="pending-note">
                Your account is pending approval. You will be notified when your account is activated.
            </div>
        </div>
    </div>
</div>

<script>
    async function logout() {
        await fetch('/logout', { method: 'POST' });
        window.location.href = '/';
    }

    function formatDate(dateString) {
        if (!dateString) return "-";

        return new Date(dateString).toLocaleString("sv-SE", {
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit"
        });
    }

    document.addEventListener("DOMContentLoaded", () => {
        const accountCreated = document.getElementById("accountCreated");
        const createdAt = accountCreated?.dataset.createdAt;

        if (accountCreated && createdAt) {
            accountCreated.textContent = formatDate(createdAt);
        }
    });
</script>
</body>
</html>
