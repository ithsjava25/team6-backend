<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Active incidents</title>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif, Roboto;
            background: #000;
            color: #fff;
        }

        .container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        h2 {
            margin-bottom: 1.5rem;
        }

        .incident-card {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: 0.2s;
        }

        .incident-card:hover {
            border-color: #2a2a2a;
        }

        .incident-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .incident-title {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .incident-category {
            font-size: 0.75rem;
            padding: 0.25rem 0.6rem;
            border-radius: 999px;
            background: #1f2937;
            color: #9ca3af;
        }

        .incident-description {
            margin-top: 0.75rem;
            color: #d1d5db;
            font-size: 0.9rem;
        }

        .incident-footer {
            margin-top: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: #6b7280;
        }

        .btn {
            padding: 0.4rem 0.8rem;
            border-radius: 999px;
            border: 1px solid #2a2a2a;
            background: transparent;
            color: #9ca3af;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:hover {
            border-color: #10b981;
            color: #10b981;
        }

        .back-dashboard-btn {
            display: inline-block;
            margin-bottom: 1.2rem;
            padding: 0.4rem 0.8rem;
            border-radius: 999px;
            border: 1px solid #2a2a2a;
            background: transparent;
            color: #9ca3af;
            text-decoration: none;
            font-size: 0.8rem;
            transition: 0.2s;
        }

        .back-dashboard-btn:hover {
            border-color: #10b981;
            color: #10b981;
        }
    </style>
</head>

<body th:attr="data-role=${role}">
<div class="container">

    <a href="/dashboard" class="back-dashboard-btn">Back to dashboard</a>

    <h2 id="title">Active incidents</h2>
    <div id="incidents"></div>
</div>

<script>
    const role = document.body.dataset.role;

    async function loadIncidents() {

        let url = "/api/incidents/my";

        if (role === "ADMIN") {
            url = "/api/incidents/all";
        } else if (role === "HANDLER") {
            url = "/api/incidents/assigned";
        } else if (role !== "RESIDENT") {
            console.error("Unknown role:", role)
            return;
        }

        const title = document.getElementById("title");

        if (role == "ADMIN") {
            title.textContent = "All Incidents";
        } else if (role == "HANDLER") {
            title.textContent = "Assigned Incidents";
        } else {
            title.textContent = "My Incidents";
        }

        try {
            const response = await fetch(url);

            if (!response.ok) {
                throw new Error("Failed to fetch incidents!");
            }

            const data = await response.json();

            const list = document.getElementById("incidents");
            list.innerHTML = "";

            data.content.forEach(incident => {
                const card = document.createElement("div");
                card.className = "incident-card";

                card.innerHTML = `
                    <div class="incident-header">
                        <div class="incident-title">
                            ${escapeHtml(incident.subject)}
                            ${incident.hasDocuments ? '📎' : ''}
                        </div>
                        <div class="incident-category">${escapeHtml(incident.incidentCategory)}</div>
                    </div>

                    <div class="incident-description">
                        ${escapeHtml(incident.description || "No description")}
                    </div>

                <div class="incident-footer">
                    <span>ID: ${incident.id}</span>

                    <div style="display: flex; gap: 0.5rem;">
                        <button class="btn" onclick="viewIncident(${incident.id})">View</button>
                    ${
                    (role === "ADMIN" || role === "HANDLER")
                        ? `<button class="btn" onclick="editIncident(${incident.id})">Edit</button>`
                        : ''
                }
                    </div>
                </div>
            `;

                list.appendChild(card);
            });
        } catch (error) {
            console.error(error);
            document.getElementById("incidents").innerHTML = "<p>Failed to load incidents.</p>";
        }
    }

    function editIncident(id) {
        alert("Edit incident " + id);
    }

    function viewIncident(id) {
        window.location.href = `/incident/${id}`;
    }

    function escapeHtml(str) {
        if (str === null || str === undefined) return "";
        return String(str)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;")
    }

    loadIncidents();

</script>
</body>
</html>
