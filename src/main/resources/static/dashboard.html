<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Incident Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            border-bottom: 1px solid #1a1a1a;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .logo a { text-decoration: none; color: #fff; font-weight: 600; font-size: 1.25rem; }
        .nav-links { display: flex; gap: 1.5rem; align-items: center; flex-wrap: wrap; }
        .nav-links a { text-decoration: none; color: #6b7280; font-size: 0.875rem; }
        .nav-links a:hover { color: #ffffff; }
        .user-info { display: flex; gap: 1rem; align-items: center; }
        .user-name { font-size: 0.875rem; color: #ffffff; }
        .role-badge { padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; }
        .role-badge.admin { background: #ef4444; color: white; }
        .role-badge.handler { background: #f97316; color: white; }
        .role-badge.resident { background: #10b981; color: white; }
        .role-badge.pending { background: #6b7280; color: white; }
        .logout-btn {
            background: transparent;
            border: 1px solid #2a2a2a;
            color: #6b7280;
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            cursor: pointer;
        }
        .logout-btn:hover { border-color: #ef4444; color: #ef4444; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1.5rem; }
        .welcome-card {
            background: linear-gradient(135deg, rgba(59,130,246,0.1), rgba(139,92,246,0.1));
            border-radius: 1.5rem;
            padding: 2rem;
            margin-bottom: 2rem;
        }
        .welcome-card h1 { font-size: 1.75rem; margin-bottom: 0.25rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
        .stat-card {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 1rem;
            padding: 1.25rem;
        }
        .stat-title { font-size: 0.75rem; color: #6b7280; text-transform: uppercase; }
        .stat-number { font-size: 2rem; font-weight: 700; }
        .incidents-card {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 1rem;
            padding: 1.5rem;
        }
        .card-header { display: flex; justify-content: space-between; margin-bottom: 1rem; }
        .incident-list { display: flex; flex-direction: column; gap: 0.5rem; }
        .incident-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.875rem;
            background: #0f0f0f;
            border-radius: 0.75rem;
            cursor: pointer;
        }
        .incident-item:hover { background: #1a1a1a; }
        .incident-title { font-weight: 500; }
        .incident-date { font-size: 0.7rem; color: #6b7280; margin-top: 0.25rem; }
        .incident-status { padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.7rem; }
        .status-OPEN { background: #fef3c7; color: #d97706; }
        .status-IN_PROGRESS { background: #dbeafe; color: #3b82f6; }
        .status-RESOLVED { background: #d1fae5; color: #10b981; }
        .status-CLOSED { background: #1f2937; color: #9ca3af; }
        .btn {
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            text-decoration: none;
            display: inline-block;
            font-weight: 500;
        }
        .btn-primary { background: #10b981; color: white; }
        .btn-handler { background: #f97316; color: white; }
        .btn-admin { background: #ef4444; color: white; }
        .btn-outline { background: transparent; border: 1px solid #2a2a2a; color: white; }
        .action-buttons { margin-top: 1rem; display: flex; gap: 1rem; }
        @media (max-width: 768px) {
            .navbar { flex-direction: column; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="logo"><a href="/">Incident Management System</a></div>
    <div class="nav-links">
        <a href="dashboard.html">Home</a>
        <a href="incidents.html" id="incidentsLink" style="display: none;">Incidents</a>
        <a href="profile.html">Profile</a>
        <a href="admin.html" id="adminLink" style="display: none;">Admin</a>  <!-- Ändrad: Default hidden -->
        <div class="user-info">
            <span class="user-name" id="userName">Loading...</span>
            <span class="role-badge" id="userRole">-</span>
            <button class="logout-btn" onclick="logout()">Sign out</button>
        </div>
    </div>
</nav>

<div class="container">
    <div class="welcome-card">
        <h1 id="welcomeMessage">Welcome!</h1>
        <p id="userEmail"></p>
    </div>
    <div id="activeContent">
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-title">Total Incidents</div><div class="stat-number" id="totalIncidents">0</div></div>
            <div class="stat-card"><div class="stat-title">Open</div><div class="stat-number" id="openIncidents">0</div></div>
            <div class="stat-card"><div class="stat-title">Resolved</div><div class="stat-number" id="resolvedIncidents">0</div></div>
        </div>
        <div class="incidents-card">
            <div class="card-header"><h3>Recent incidents</h3><a href="incidents.html" class="btn btn-outline">View all →</a></div>
            <div id="incidentsList" class="incident-list"><p style="text-align: center; color: #6b7280;">Loading incidents...</p></div>
            <div id="actionButtons" class="action-buttons"></div>
        </div>
    </div>
</div>

<script>
    let currentUser = null;

    async function loadCurrentUser() {
        try {
            const response = await fetch('/api/users/me');
            if (response.ok) {
                currentUser = await response.json();
                document.getElementById('userName').textContent = currentUser.name || currentUser.githubLogin;
                document.getElementById('userEmail').textContent = currentUser.email || '';
                document.getElementById('welcomeMessage').textContent = `Welcome, ${currentUser.name || currentUser.githubLogin}!`;
                const roleBadge = document.getElementById('userRole');
                roleBadge.textContent = currentUser.role;
                roleBadge.className = `role-badge ${currentUser.role.toLowerCase()}`;

                if (currentUser.role !== 'PENDING' && currentUser.active) {
                    document.getElementById('incidentsLink').style.display = 'inline';
                    if (currentUser.role === 'ADMIN') {
                        document.getElementById('adminLink').style.display = 'inline';
                    }
                    loadIncidents();
                }
            } else { window.location.href = '/'; }
        } catch (error) { window.location.href = '/'; }
    }

    async function loadIncidents() {
        if (!currentUser) return;
        let url = '';
        if (currentUser.role === 'RESIDENT') url = '/api/incidents/my?size=5&sort=createdAt,desc';
        else if (currentUser.role === 'HANDLER') url = '/api/incidents/assigned?size=5&sort=createdAt,desc';
        else if (currentUser.role === 'ADMIN') url = '/api/incidents/all?size=5&sort=createdAt,desc';
        else return;

        try {
            const response = await fetch(url);
            const data = await response.json();
            const incidents = data.content || [];
            document.getElementById('totalIncidents').textContent = data.totalElements || 0;
            document.getElementById('openIncidents').textContent = incidents.filter(i => i.incidentStatus === 'OPEN').length;
            document.getElementById('resolvedIncidents').textContent = incidents.filter(i => i.incidentStatus === 'RESOLVED' || i.incidentStatus === 'CLOSED').length;

            const container = document.getElementById('incidentsList');
            if (incidents.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #6b7280;">No incidents yet.</p>';
            } else {
                container.innerHTML = incidents.map(i => `<div class="incident-item" onclick="viewIncident(${i.id})">
                    <div><div class="incident-title">${escapeHtml(i.subject)}</div><div class="incident-date">${formatDate(i.createdAt)}</div></div>
                    <span class="incident-status status-${i.incidentStatus}">${i.incidentStatus}</span>
                </div>`).join('');
            }

            const actionButtons = document.getElementById('actionButtons');
            if (currentUser.role === 'RESIDENT') actionButtons.innerHTML = '<a href="createincident.html" class="btn btn-primary">Create new incident</a>';
            else if (currentUser.role === 'HANDLER') actionButtons.innerHTML = '<a href="incidents.html" class="btn btn-handler">Manage incidents</a>';
            else if (currentUser.role === 'ADMIN') actionButtons.innerHTML = '<a href="admin.html" class="btn btn-admin">Go to Admin Panel</a>';
        } catch (error) { console.error('Error loading incidents:', error); }
    }

    function viewIncident(id) {
        window.location.href = `/viewincident.html?id=${id}`;
    }

    async function logout() {
        await fetch('/logout', { method: 'POST' });
        window.location.href = '/';
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function formatDate(dateString) {
        if (!dateString) return "-";
        return new Date(dateString).toLocaleString("sv-SE", {
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit"
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadCurrentUser();
    });
</script>
</body>
</html>
