<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Profile - Incident Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            border-bottom: 1px solid #1a1a1a;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .logo a { text-decoration: none; color: #fff; font-weight: 600; }
        .nav-links { display: flex; gap: 1.5rem; align-items: center; flex-wrap: wrap; }
        .nav-links a { text-decoration: none; color: #6b7280; }
        .nav-links a:hover { color: #ffffff; }
        .user-info { display: flex; gap: 1rem; align-items: center; }
        .logout-btn {
            background: transparent;
            border: 1px solid #2a2a2a;
            color: #6b7280;
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            cursor: pointer;
        }
        .container { max-width: 600px; margin: 2rem auto; padding: 0 1.5rem; }
        .profile-card {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 1.5rem;
            overflow: hidden;
        }
        .profile-header {
            background: linear-gradient(135deg, rgba(16,185,129,0.2), rgba(5,150,105,0.1));
            padding: 2rem;
            text-align: center;
        }
        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 1rem;
            overflow: hidden;
        }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-placeholder {
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #10b981, #059669);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 600;
            color: white;
        }
        .profile-body { padding: 2rem; }
        .info-group { margin-bottom: 1.5rem; }
        .info-label { font-size: 0.75rem; color: #6b7280; text-transform: uppercase; margin-bottom: 0.25rem; }
        .info-value { font-size: 1rem; font-weight: 500; }
        .role-badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; }
        .role-badge.admin { background: #ef4444; }
        .role-badge.handler { background: #f97316; }
        .role-badge.resident { background: #10b981; }
        .role-badge.pending { background: #6b7280; }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="logo"><a href="/">Incident Management System</a></div>
    <div class="nav-links">
        <a href="dashboard.html">Home</a>
        <a href="incidents.html">Incidents</a>
        <a href="profile.html">Profile</a>
        <a href="admin.html" id="adminLink" style="display: none;">Admin</a>
        <div class="user-info"><span class="user-name" id="userName">Loading...</span><button class="logout-btn" onclick="logout()">Sign out</button></div>
    </div>
</nav>
<div class="container">
    <div class="profile-card">
        <div class="profile-header">
            <div class="profile-avatar" id="avatar"></div>
            <h2 id="displayName">Loading...</h2>
            <p id="userEmail"></p>
            <span class="role-badge" id="userRole">-</span>
        </div>
        <div class="profile-body">
            <div class="info-group"><div class="info-label">Display Name</div><div class="info-value" id="name"></div></div>
            <div class="info-group"><div class="info-label">Email</div><div class="info-value" id="email"></div></div>
            <div class="info-group"><div class="info-label">GitHub Username</div><div class="info-value" id="githubLogin"></div></div>
            <div class="info-group"><div class="info-label">Account Created</div><div class="info-value" id="createdAt"></div></div>
        </div>
    </div>
</div>
<script>
    let currentUser = null;

    async function loadUser() {
        try {
            const r = await fetch('/api/users/me');
            if (r.ok) {
                currentUser = await r.json();
                document.getElementById('displayName').textContent = currentUser.name || currentUser.githubLogin;
                document.getElementById('userName').textContent = currentUser.name || currentUser.githubLogin;
                document.getElementById('userEmail').textContent = currentUser.email || '';
                document.getElementById('name').textContent = currentUser.name || currentUser.githubLogin;
                document.getElementById('email').textContent = currentUser.email || 'Not set';
                document.getElementById('githubLogin').textContent = currentUser.githubLogin;
                document.getElementById('createdAt').textContent = formatDate(currentUser.createdAt);

                const roleBadge = document.getElementById('userRole');
                roleBadge.textContent = currentUser.role;
                roleBadge.className = `role-badge ${currentUser.role.toLowerCase()}`;

                const avatarDiv = document.getElementById('avatar');
                if (currentUser.avatarUrl) {
                    avatarDiv.innerHTML = `<img src="${currentUser.avatarUrl}" alt="Profile">`;
                } else {
                    avatarDiv.innerHTML = `<div class="avatar-placeholder">${(currentUser.name || currentUser.githubLogin).charAt(0).toUpperCase()}</div>`;
                }

                if (currentUser.role === 'ADMIN') {
                    document.getElementById('adminLink').style.display = 'inline';
                }
            } else {
                window.location.href = '/';
            }
        } catch(e) {
            window.location.href = '/';
        }
    }

    async function logout() {
        await fetch('/logout', { method: 'POST' });
        window.location.href = '/';
    }

    function formatDate(ds) {
        if (!ds) return "-";
        return new Date(ds).toLocaleString("sv-SE", {
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit"
        });
    }

    loadUser();
</script>
</body>
</html>
