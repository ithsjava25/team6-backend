<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Incidents</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #000; color: #fff; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; border-bottom: 1px solid #1a1a1a; flex-wrap: wrap; gap: 1rem; }
        .logo a { text-decoration: none; color: #fff; font-weight: 600; }
        .nav-links { display: flex; gap: 1.5rem; align-items: center; flex-wrap: wrap; }
        .nav-links a { text-decoration: none; color: #6b7280; }
        .nav-links a:hover { color: #fff; }
        .user-info { display: flex; gap: 1rem; align-items: center; }
        .logout-btn { background: transparent; border: 1px solid #2a2a2a; color: #6b7280; padding: 0.5rem 1rem; border-radius: 9999px; cursor: pointer; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1.5rem; }
        h2 { margin-bottom: 1.5rem; }
        .incident-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 1rem; padding: 1.5rem; margin-bottom: 1rem; cursor: pointer; }
        .incident-card:hover { border-color: #2a2a2a; }
        .incident-header { display: flex; justify-content: space-between; margin-bottom: 0.75rem; flex-wrap: wrap; gap: 0.5rem; }
        .incident-title { font-size: 1.1rem; font-weight: 600; }
        .incident-category { font-size: 0.75rem; padding: 0.25rem 0.6rem; border-radius: 999px; background: #1f2937; }
        .incident-status { padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.7rem; font-weight: 500; }
        .status-OPEN { background: #f59e0b; color: white; }
        .status-IN_PROGRESS { background: #3b82f6; color: white; }
        .status-RESOLVED { background: #10b981; color: white; }
        .status-CLOSED { background: #6b7280; color: white; }
        .btn { padding: 0.5rem 1rem; border-radius: 9999px; text-decoration: none; display: inline-block; background: #1a1a1a; border: 1px solid #2a2a2a; color: #fff; cursor: pointer; }
        .btn-primary { background: #10b981; border: none; }
        .loading { text-align: center; padding: 2rem; color: #6b7280; }
        .error-message { text-align: center; padding: 2rem; color: #ef4444; }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="logo"><a href="/">Incident Management System</a></div>
    <div class="nav-links">
        <a href="dashboard.html">Home</a>
        <a href="incidents.html">Incidents</a>
        <a href="profile.html">Profile</a>
        <a href="admin.html" id="adminLink" style="display: none;">Admin</a>  <!-- Dold som standard -->
        <div class="user-info"><span id="userName">Loading...</span><button class="logout-btn" onclick="logout()">Sign out</button></div>
    </div>
</nav>
<div class="container">
    <h2 id="title">Loading...</h2>
    <div id="incidents"><div class="loading">Loading incidents...</div></div>
</div>

<script>
    let userRole = '';
    let currentUser = null;

    async function loadUser() {
        try {
            const r = await fetch('/api/users/me');
            if (r.ok) {
                currentUser = await r.json();
                document.getElementById('userName').textContent = currentUser.name || currentUser.githubLogin;
                userRole = currentUser.role;

                // ***** Visa Admin-länken ENDAST för ADMIN-rollen *****
                if (userRole === 'ADMIN') {
                    document.getElementById('adminLink').style.display = 'inline';
                }

                loadIncidents();
            } else {
                window.location.href = '/';
            }
        } catch(e) {
            window.location.href = '/';
        }
    }

    async function loadIncidents() {
        let url = '';
        if (userRole === 'RESIDENT') {
            url = '/api/incidents/my?sort=createdAt,desc';
        } else if (userRole === 'HANDLER') {
            url = '/api/incidents/assigned?sort=createdAt,desc';
        } else if (userRole === 'ADMIN') {
            url = '/api/incidents/all?sort=createdAt,desc';
        } else {
            return;
        }

        const title = document.getElementById('title');
        if (userRole === 'ADMIN') {
            title.textContent = 'All Incidents';
        } else if (userRole === 'HANDLER') {
            title.textContent = 'Assigned Incidents';
        } else {
            title.textContent = 'My Incidents';
        }

        try {
            const r = await fetch(url);
            if (!r.ok) throw new Error('Failed to fetch incidents');

            const d = await r.json();
            const incidents = d.content || [];
            const container = document.getElementById('incidents');

            if (incidents.length === 0) {
                container.innerHTML = '<div class="loading">No incidents found.</div>';
                return;
            }

            container.innerHTML = incidents.map(i => `
                <div class="incident-card" onclick="viewIncident(${i.id})">
                    <div class="incident-header">
                        <div class="incident-title">${escapeHtml(i.subject)}${i.hasDocuments ? ' 📎' : ''}</div>
                        <div class="incident-category">${i.incidentCategory}</div>
                    </div>
                    <div class="incident-description">${escapeHtml(i.description || 'No description')}</div>
                    <div class="incident-footer" style="margin-top:1rem;display:flex;justify-content:space-between;font-size:0.75rem;color:#6b7280;">
                        <span>ID: ${i.id}</span>
                        <span class="incident-status status-${i.incidentStatus}">${i.incidentStatus}</span>
                        <span>Created: ${formatDate(i.createdAt)}</span>
                    </div>
                </div>
            `).join('');
        } catch(e) {
            console.error('Error loading incidents:', e);
            document.getElementById('incidents').innerHTML = '<div class="error-message">Failed to load incidents. Please try again.</div>';
        }
    }

    function viewIncident(id) {
        window.location.href = `/viewincident.html?id=${id}`;
    }

    async function logout() {
        await fetch('/logout', { method: 'POST' });
        window.location.href = '/';
    }

    function escapeHtml(t) {
        if (!t) return '';
        const d = document.createElement('div');
        d.textContent = t;
        return d.innerHTML;
    }

    function formatDate(ds) {
        if (!ds) return "-";
        return new Date(ds).toLocaleString("sv-SE", {
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit"
        });
    }

    loadUser();
</script>
</body>
</html>
