<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Incidents</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #000; color: #fff; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; border-bottom: 1px solid #1a1a1a; flex-wrap: wrap; gap: 1rem; }
        .logo a { text-decoration: none; color: #fff; font-weight: 600; }
        .nav-links { display: flex; gap: 1.5rem; align-items: center; flex-wrap: wrap; }
        .nav-links a { text-decoration: none; color: #6b7280; }
        .nav-links a:hover { color: #fff; }
        .user-info { display: flex; gap: 1rem; align-items: center; }
        .logout-btn { background: transparent; border: 1px solid #2a2a2a; color: #6b7280; padding: 0.5rem 1rem; border-radius: 9999px; cursor: pointer; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1.5rem; }
        h2 { margin-bottom: 1.5rem; }
        .incident-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 1rem; padding: 1.5rem; margin-bottom: 1rem; cursor: pointer; transition: all 0.2s; }
        .incident-card:hover { border-color: #10b981; }
        .incident-header { display: flex; justify-content: space-between; margin-bottom: 0.75rem; flex-wrap: wrap; gap: 0.5rem; }
        .incident-title { font-size: 1.1rem; font-weight: 600; }
        .incident-category { font-size: 0.75rem; padding: 0.25rem 0.6rem; border-radius: 999px; background: #1f2937; }
        .incident-description { color: #9ca3af; font-size: 0.875rem; margin-bottom: 1rem; }
        .incident-footer { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; margin-top: 1rem; }
        .incident-status { padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.7rem; font-weight: 500; }
        .status-OPEN { background: #f59e0b; color: white; }
        .status-IN_PROGRESS { background: #3b82f6; color: white; }
        .status-RESOLVED { background: #10b981; color: white; }
        .status-CLOSED { background: #6b7280; color: white; }
        .btn { padding: 0.5rem 1rem; border-radius: 9999px; text-decoration: none; display: inline-block; background: #1a1a1a; border: 1px solid #2a2a2a; color: #fff; cursor: pointer; font-size: 0.75rem; }
        .loading { text-align: center; padding: 2rem; color: #6b7280; }
        .error-message { text-align: center; padding: 2rem; color: #ef4444; }
        .filters-bar { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
        .search-box { flex: 1; min-width: 250px; display: flex; gap: 0.5rem; }
        .search-box input { background: #0a0a0a; border: 1px solid #2a2a2a; border-radius: 0.5rem; padding: 0.625rem 1rem; color: #ffffff; flex: 1; }
        .search-box input:focus { outline: none; border-color: #10b981; }
        .search-box button, .filter-group select, .clear-btn { background: #1a1a1a; border: 1px solid #2a2a2a; color: #ffffff; padding: 0.625rem 1rem; border-radius: 0.5rem; cursor: pointer; }
        .search-box button:hover, .clear-btn:hover { border-color: #10b981; }
        .toast { position: fixed; bottom: 2rem; right: 2rem; padding: 1rem 1.5rem; border-radius: 0.5rem; background: #1a1a1a; border-left: 4px solid; z-index: 1000; animation: slideIn 0.3s ease; }
        .toast.success { border-left-color: #10b981; }
        .toast.error { border-left-color: #ef4444; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @media (max-width: 768px) { .navbar { flex-direction: column; } .filters-bar { flex-direction: column; } .search-box { width: 100%; } }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="logo"><a href="/">Incident Management System</a></div>
    <div class="nav-links">
        <a href="dashboard.html">Home</a>
        <a href="incidents.html">Incidents</a>
        <a href="profile.html">Profile</a>
        <a href="admin.html" id="adminLink" style="display: none;">Admin</a>
        <div class="user-info"><span id="userName">Loading...</span><button class="logout-btn" onclick="logout()">Sign out</button></div>
    </div>
</nav>
<div class="container">
    <h2 id="title">Loading...</h2>

    <div class="filters-bar">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search by subject or description...">
            <button onclick="searchIncidents()">Search</button>
        </div>
        <div class="filter-group">
            <select id="statusFilter">
                <option value="">All Status</option>
                <option value="OPEN">Open</option>
                <option value="IN_PROGRESS">In Progress</option>
                <option value="RESOLVED">Resolved</option>
                <option value="CLOSED">Closed</option>
            </select>
        </div>
        <button class="clear-btn" onclick="clearFilters()">Clear</button>
    </div>

    <div id="incidents"><div class="loading">Loading incidents...</div></div>
</div>

<script>
    let userRole = '';
    let currentUser = null;
    let currentSearch = '';
    let currentStatus = '';

    async function loadUser() {
        try {
            const r = await fetch('/api/users/me');
            if (r.ok) {
                currentUser = await r.json();
                document.getElementById('userName').textContent = currentUser.name || currentUser.githubLogin;
                userRole = currentUser.role;

                if (userRole === 'ADMIN') {
                    document.getElementById('adminLink').style.display = 'inline';
                    document.getElementById('title').textContent = 'All Incidents';
                } else if (userRole === 'HANDLER') {
                    document.getElementById('title').textContent = 'My Assigned Incidents';
                } else {
                    document.getElementById('title').textContent = 'My Incidents';
                }

                loadIncidents();
            } else {
                window.location.href = '/';
            }
        } catch(e) {
            window.location.href = '/';
        }
    }

    async function loadIncidents() {
        let params = new URLSearchParams();
        if (currentSearch) params.append('search', currentSearch);
        if (currentStatus) params.append('status', currentStatus);
        params.append('size', '50');

        let url;
        if (userRole === 'ADMIN') {
            url = '/api/incidents/all?' + params.toString();
        } else if (userRole === 'HANDLER') {
            url = '/api/incidents/assigned?' + params.toString();
        } else {
            url = '/api/incidents/my?' + params.toString();
        }

        try {
            const r = await fetch(url);
            if (!r.ok) throw new Error('Failed to fetch incidents');
            const d = await r.json();
            const incidents = d.content || [];
            const container = document.getElementById('incidents');

            if (incidents.length === 0) {
                container.innerHTML = '<div class="loading">No incidents found.</div>';
                return;
            }

            container.innerHTML = incidents.map(i => {
                const statusHtml = `<span class="incident-status status-${i.incidentStatus}">${i.incidentStatus}</span>`;

                return `
                    <div class="incident-card" onclick="viewIncident(${i.id})">
                        <div class="incident-header">
                            <div class="incident-title">${escapeHtml(i.subject)}${i.hasDocuments ? ' 📎' : ''}</div>
                            <div class="incident-category">${i.incidentCategory}</div>
                        </div>
                        <div class="incident-description">${escapeHtml(i.description || 'No description')}</div>
                        <div class="incident-footer">
                            <div style="display:flex;gap:0.75rem;flex-wrap:wrap;">
                                <span style="font-size:0.7rem;color:#6b7280;">ID: ${i.id}</span>
                                <span style="font-size:0.7rem;color:#6b7280;">Created: ${formatDate(i.createdAt)}</span>
                                <span style="font-size:0.7rem;color:#6b7280;">By: ${escapeHtml(i.createdBy || 'Unknown')}</span>
                                ${i.assignedTo ? `<span style="font-size:0.7rem;color:#10b981;">Handler: ${escapeHtml(i.assignedTo)}</span>` : '<span style="font-size:0.7rem;color:#6b7280;">Unassigned</span>'}
                            </div>
                            ${statusHtml}
                        </div>
                    </div>
                `;
            }).join('');
        } catch(e) {
            console.error('Error loading incidents:', e);
            document.getElementById('incidents').innerHTML = '<div class="error-message">Failed to load incidents. Please try again.</div>';
        }
    }

    function viewIncident(id) {
        window.location.href = `/viewincident.html?id=${id}`;
    }

    function searchIncidents() {
        currentSearch = document.getElementById('searchInput').value;
        currentPage = 0;
        loadIncidents();
    }

    function clearFilters() {
        document.getElementById('searchInput').value = '';
        document.getElementById('statusFilter').value = '';
        currentSearch = '';
        currentStatus = '';
        loadIncidents();
    }

    document.getElementById('statusFilter')?.addEventListener('change', e => {
        currentStatus = e.target.value;
        loadIncidents();
    });

    document.getElementById('searchInput')?.addEventListener('keypress', e => {
        if (e.key === 'Enter') searchIncidents();
    });

    async function logout() {
        await fetch('/logout', { method: 'POST' });
        window.location.href = '/';
    }

    function escapeHtml(t) {
        if (!t) return '';
        const d = document.createElement('div');
        d.textContent = t;
        return d.innerHTML;
    }

    function formatDate(dateString) {
        if (!dateString) return "-";
        return new Date(dateString).toLocaleString("sv-SE", {
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit"
        });
    }

    function showToast(message, type) {
        const t = document.createElement('div');
        t.className = `toast ${type}`;
        t.textContent = message;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    loadUser();
</script>
</body>
</html>
