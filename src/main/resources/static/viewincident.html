<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>View Incident</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #000; color: #fff; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; border-bottom: 1px solid #1a1a1a; }
        .logo a { text-decoration: none; color: #fff; font-weight: 600; }
        .nav-links { display: flex; gap: 1.5rem; align-items: center; }
        .nav-links a { text-decoration: none; color: #6b7280; }
        .user-info { display: flex; gap: 1rem; align-items: center; }
        .logout-btn { background: transparent; border: 1px solid #2a2a2a; color: #6b7280; padding: 0.5rem 1rem; border-radius: 9999px; cursor: pointer; }
        .container { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 1rem; padding: 1.5rem; margin-bottom: 1rem; }
        .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
        .incident-header { display: flex; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem; }
        .incident-title { font-size: 1.1rem; font-weight: 600; }
        .incident-category { font-size: 0.75rem; padding: 0.25rem 0.6rem; border-radius: 999px; background: #1f2937; }
        .incident-status { padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.7rem; font-weight: 500; display: inline-block; }
        .status-OPEN { background: #f59e0b; }
        .status-IN_PROGRESS { background: #3b82f6; }
        .status-RESOLVED { background: #10b981; }
        .status-CLOSED { background: #6b7280; }
        .comment { padding: 1rem 0; border-bottom: 1px solid #1a1a1a; }
        .comment-message { color: #d1d5db; margin-bottom: 0.4rem; }
        .comment-meta { font-size: 0.75rem; color: #6b7280; }
        .btn { padding: 0.4rem 0.8rem; border-radius: 999px; border: 1px solid #2a2a2a; background: transparent; color: #9ca3af; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn:hover { border-color: #10b981; color: #10b981; }
        textarea { width: 100%; background: #111; color: white; border: 1px solid #2a2a2a; border-radius: 0.75rem; padding: 1rem; resize: vertical; font-family: inherit; }
        .back-link { display: inline-block; margin-bottom: 1rem; }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="logo"><a href="/">Incident Management System</a></div>
    <div class="nav-links">
        <a href="dashboard.html">Home</a>
        <a href="incidents.html">Incidents</a>
        <a href="profile.html">Profile</a>
        <div class="user-info"><span id="userName">Loading...</span><button class="logout-btn" onclick="logout()">Sign out</button></div>
    </div>
</nav>

<div class="container">
    <a href="dashboard.html" class="btn back-link">← Back to dashboard</a>
    <h2>Incident details</h2>
    <div id="incident"></div>
    <div class="card"><div class="section-title">Comments</div><div id="comments"></div></div>
    <div class="card"><div class="section-title">Add comment</div>
        <textarea id="commentMessage" rows="3" placeholder="Write a comment..."></textarea>
        <button class="btn" onclick="addComment()" style="margin-top: 0.75rem;">Add comment</button>
    </div>
    <div class="card"><div class="section-title">Activity</div><div id="activity-log"></div></div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    let incidentId = urlParams.get('id');
    let currentUser = null;

    if (!incidentId) {
        document.getElementById('incident').innerHTML = '<div class="card"><p>No incident ID provided.</p></div>';
    }

    async function loadUser() {
        try {
            const r = await fetch('/api/users/me');
            if (r.ok) {
                currentUser = await r.json();
                document.getElementById('userName').textContent = currentUser.name || currentUser.githubLogin;
            } else {
                window.location.href = '/';
            }
        } catch(e) {
            window.location.href = '/';
        }
    }

    async function loadIncident() {
        if (!incidentId) return;
        try {
            const r = await fetch(`/api/incidents/${incidentId}`);
            if (!r.ok) throw new Error();
            const i = await r.json();
            let docsHtml = '';
            if (i.hasDocuments && i.documents?.length > 0) {
                docsHtml = `<div style="margin-top:10px; display:flex; gap:12px; flex-wrap:wrap;">` + i.documents.map(doc => {
                    const url = `/documents/${encodeURIComponent(doc.fileKey)}`;
                    return /\.(jpg|jpeg|png|gif|webp)$/i.test(doc.fileName)
                        ? `<a href="${url}" target="_blank"><img src="${url}" style="width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid #2a2a2a;"></a>`
                        : `<a href="${url}" target="_blank" class="btn">📄 ${escapeHtml(doc.fileName)}</a>`;
                }).join('') + `</div>`;
            }
            document.getElementById('incident').innerHTML = `<div class="card"><div class="incident-header"><div class="incident-title">${escapeHtml(i.subject)}</div><div class="incident-category">${i.incidentCategory}</div></div><div class="incident-description">${escapeHtml(i.description || 'No description')}${docsHtml}</div><div class="incident-footer" style="margin-top:1rem;display:flex;gap:1rem;font-size:0.75rem;color:#6b7280;"><span>ID: ${i.id}</span><span class="incident-status status-${i.incidentStatus}">${i.incidentStatus}</span><span>Created: ${formatDate(i.createdAt)}</span></div></div>`;
        } catch(e) { document.getElementById('incident').innerHTML = '<div class="card"><p>Failed to load incident.</p></div>'; }
    }

    async function loadComments() {
        if (!incidentId) return;
        try {
            const r = await fetch(`/comments/incident/${incidentId}`);
            if (!r.ok) throw new Error();
            const comments = await r.json();
            if (!comments.length) { document.getElementById('comments').innerHTML = '<p style="color:#6b7280;">No comments yet.</p>'; return; }
            document.getElementById('comments').innerHTML = comments.map(c => `<div class="comment"><div class="comment-message">${escapeHtml(c.message)}</div><div class="comment-meta">${escapeHtml(c.user?.name || 'Unknown')} • ${formatDate(c.createdAt)}</div></div>`).join('');
        } catch(e) { document.getElementById('comments').innerHTML = '<p style="color:#6b7280;">Failed to load comments.</p>'; }
    }

    async function loadActivityLog() {
        if (!incidentId) return;
        try {
            const r = await fetch(`/activity/incident/${incidentId}`);
            if (!r.ok) throw new Error();
            const activities = await r.json();
            if (!activities.length) { document.getElementById('activity-log').innerHTML = '<p style="color:#6b7280;">No activity yet.</p>'; return; }
            document.getElementById('activity-log').innerHTML = activities.map(a => `<div class="comment"><div class="comment-message">${escapeHtml(a.description)}</div><div class="comment-meta">${escapeHtml(a.userName || 'Unknown')} • ${formatDate(a.createdAt)}</div></div>`).join('');
        } catch(e) { document.getElementById('activity-log').innerHTML = '<p style="color:#6b7280;">Failed to load activity.</p>'; }
    }

    async function addComment() {
        const message = document.getElementById('commentMessage').value.trim();
        if (!message) { alert('Please enter a comment'); return; }
        try {
            const r = await fetch('/comments', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ incidentId: parseInt(incidentId), userId: currentUser?.id, message })
            });
            if (r.ok) {
                document.getElementById('commentMessage').value = '';
                loadComments();
                loadActivityLog();
            } else { alert('Failed to add comment'); }
        } catch(e) { alert('Error adding comment'); }
    }

    function escapeHtml(t){if(!t)return '';const d=document.createElement('div');d.textContent=t;return d.innerHTML;}
    function formatDate(ds){if(!ds)return "-";return new Date(ds).toLocaleString("sv-SE",{year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"});}
    async function logout(){await fetch('/logout',{method:'POST'});window.location.href='/';}

    loadUser().then(() => { loadIncident(); loadComments(); loadActivityLog(); });
</script>
</body>
</html>
